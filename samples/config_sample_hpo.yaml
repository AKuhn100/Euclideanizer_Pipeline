# Pipeline config template for HPO (run_hpo.py).
# Use as pipeline_config in hpo_config.yaml. Optuna fills the keys in search_space; all other keys come from here.
# Placeholder (null) values below are overwritten per trial: distmap/euclideanizer tuned params by Optuna; output_dir, data.path, data.split_seed, and epochs (if epoch_cap set) by run_hpo.
#
# Score-centric requirements (run_hpo exits if violated): scoring.enabled and plotting.enabled must be true;
# plotting.sample_variance and each analysis.*.sample_variance (rmsd_gen, q_gen, coord_clustering_gen, distmap_clustering_gen) must include 1 (scoring uses gen variance 1 only). All four analysis gen blocks must be enabled.

resume: True   # each trial is a fresh directory; HPO resume (--resume) is the Optuna study, not pipeline resume
# Calibration: used when distmap.batch_size or euclideanizer.batch_size is null. gen_decode_batch_size and query_batch_size are set in config.
calibration_safety_margin_gb: 15.0
calibration_binary_search_steps: 5
calibration_training_batch_cap: 4096

data:
  path: null   # set by HPO (data_path)
  split_seed: null   # set by HPO (seed)
  training_split: [0.8]
  exp_stats_chunk_size: 1000
  exp_stats_avg_map_sample: 5000

output_dir: null   # set by HPO to trial_dir

distmap:
  latent_dim: null   # filled by Optuna
  beta_kl: null   # filled by Optuna
  epochs: 500   # overridden by HPO epoch_cap when set
  batch_size: 128
  learning_rate: 2.0e-4
  lambda_mse: null   # filled by Optuna
  lambda_w_recon: null   # filled by Optuna
  lambda_w_gen: null   # filled by Optuna
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: true
  patience: 50

euclideanizer:
  epochs: 500   # overridden by HPO epoch_cap when set
  batch_size: 128
  learning_rate: 4.0e-4
  lambda_mse: null   # filled by Optuna
  lambda_w_recon: null   # filled by Optuna
  lambda_w_gen: null   # filled by Optuna
  lambda_w_diag_recon: null   # filled by Optuna
  lambda_w_diag_gen: null   # filled by Optuna
  num_diags: null   # filled by Optuna
  lambda_kabsch_mse: null   # filled by Optuna
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: true
  patience: 50

training_visualization:
  enabled: true
  n_probe: 6
  n_quick: 500
  gen_sample_variance: 1
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true

plotting:
  enabled: true
  overwrite_existing: false
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  bond_length_by_genomic_distance: true
  num_samples: 5000   # match max_test for gen plots
  gen_decode_batch_size: 256
  sample_variance: [1]   # scoring uses variance 1 only
  num_reconstruction_samples: 5
  max_train: 5000
  max_test: 5000
  save_data: true
  save_pdf_copy: false
  save_structures_gro: true

# Analysis: all enabled; max_train/max_test 5000 for rmsd, 500 for q, null for clustering and latent. num_samples match: rmsd 5000, q 500, clustering gen = match train size (5000).
analysis:
  rmsd_max_train: 1000
  rmsd_max_test: 1000
  q_max_train: 100
  q_max_test: 100
  coord_clustering_max_train: null
  coord_clustering_max_test: null
  distmap_clustering_max_train: null
  distmap_clustering_max_test: null
  latent_max_train: null
  latent_max_test: null
  rmsd_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [1000]
    sample_variance: [1]
    query_batch_size: 256   # CPU RAM; set based on system memory (not calibrated)
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: false
    save_structures_gro: false
  rmsd_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [1000]
    max_recon_test: [1000]
    save_data: true
    save_pdf_copy: false
  q_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [100]
    sample_variance: [1]
    delta: 0.7071
    query_batch_size: 64   # CPU RAM; set based on system memory (not calibrated)
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: false
    save_structures_gro: false
  q_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [500]
    delta: 0.7071
    save_data: true
    save_pdf_copy: false
  coord_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [5000]   # match train size (subsampling handles reduction)
    sample_variance: [1]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: false
  coord_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [null]
    max_recon_test: [null]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    save_data: true
    save_pdf_copy: false
  distmap_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [5000]
    sample_variance: [1]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    feats_batch_size: 64
    save_data: true
    save_pdf_copy: false
  distmap_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [null]
    max_recon_test: [null]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    feats_batch_size: 64
    save_data: true
    save_pdf_copy: false
  latent:
    enabled: true
    overwrite_existing: false
    save_data: true
    save_pdf_copy: false

scoring:
  enabled: true
  overwrite_existing: false
  save_pdf_copy: false

dashboard:
  enabled: true
