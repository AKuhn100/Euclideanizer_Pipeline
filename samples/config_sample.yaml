# Sample config for Euclideanizer pipeline.
# Every key can be a single value or a list; lists create a grid (train/plot once per combination).
# CLI flags override these. Dataset path is required for training: set --data or data.path here.
# The project does not bundle large data; use tests/test_data/spheres.npz (generate with tests/test_data/generate_spheres.py) or your own .npz path.

resume: true   # if true, skip runs that already have checkpoints; if false, overwrite existing outputs
# Calibration: fixed GB reserved regardless of GPU size; max halving steps after OOM.
calibration_safety_margin_gb: 15.0
calibration_binary_search_steps: 5
# Upper bound for training batch-size calibration (distmap/euclideanizer batch_size when null).
calibration_training_batch_cap: 512

data:
  path: "tests/test_data/spheres.npz"   # path to NPZ dataset (key 'coords', shape (n_structures, n_atoms, 3)); required for training (or pass --data)
  split_seed: [0, 42]   # RNG seed(s) for train/test split; list = one full pipeline per seed (output under base_output_dir/seed_<n> or seed_<n>_split_<frac> when multiple splits)
  training_split: [0.8]   # fraction for training; single float or list of floats in (0,1); list = one full pipeline per value (output under seed_<n>_split_<frac>); same for DistMap, Euclideanizer, plotting, and analysis
  exp_stats_chunk_size: 100   # batch size when computing distance maps for experimental statistics (memory vs speed)
  exp_stats_avg_map_sample: 100   # number of structures to average for avg_exp_map in experimental statistics
  max_data: null   # optional cap on structures loaded from data.path (null = all)

output_dir: "./output"   # root directory for all run outputs (seeds, distmap, euclideanizer, plots, analysis)

# DistMap (distance-map VAE). Any key can be single or list; full product is run.
distmap:
  latent_dim: [256]   # dimension of the latent space
  beta_kl: [0.01]   # weight for KL term in VAE loss
  epochs: [1, 2]   # training epochs; list = multi-segment (e.g. train to 1, then resume to 2)
  batch_size: 128   # null = auto-calibrate at start of each run; or set an integer to use a fixed value
  learning_rate: [1.0e-4]   # optimizer learning rate
  lambda_mse: [1.0]   # weight for MSE reconstruction loss
  lambda_w_recon: [3.0]   # weight for Wasserstein reconstruction term
  lambda_w_gen: [3.0]   # weight for Wasserstein generation term
  memory_efficient: false   # if true, save best model to disk on each new best (reduces RAM, no in-memory copy)
  save_final_models_per_stretch: true   # if true, keep model_last.pt for each epoch segment; if false, delete previous segment's last after resume
  early_stopping: false   # if true, stop when validation loss has not improved for patience epochs (no further segments run)
  patience: 20   # epochs without validation improvement before stopping (used only when early_stopping is true)

# Euclideanizer. One run per (DistMap run × euclideanizer hyperparameter combination). Latent dim is taken from the frozen DistMap.
euclideanizer:
  epochs: [1]   # training epochs; list = multi-segment
  batch_size: 128  # null = auto-calibrate at start of each run; or set an integer to use a fixed value
  learning_rate: [1.0e-4]   # optimizer learning rate
  lambda_mse: [1.0]   # weight for MSE reconstruction loss
  lambda_w_recon: [3.0]   # weight for Wasserstein reconstruction term
  lambda_w_gen: [3.0]   # weight for Wasserstein generation term
  lambda_w_diag_recon: [2.0]   # weight for diagonal Wasserstein on reconstruction
  lambda_w_diag_gen: [2.0]   # weight for diagonal Wasserstein on generation
  num_diags: [50]   # number of diagonals (genomic separations) used for diagonal Wasserstein loss (1..num_diags)
  lambda_kabsch_mse: 0   # weight for MSE(gt_coords, Kabsch_aligned(recon_coords)); 0 = off
  memory_efficient: false   # if true, save best model to disk on each new best (reduces RAM)
  save_final_models_per_stretch: true   # if true, keep euclideanizer_last.pt for each epoch segment; if false, delete previous segment's last after resume
  early_stopping: false   # if true, stop when validation loss has not improved for patience epochs (no further segments run)
  patience: 20   # epochs without validation improvement before stopping (used only when early_stopping is true)

# Training videos: one MP4 per DistMap and per Euclideanizer (generated during/after each training run). Requires ffmpeg.
training_visualization:
  enabled: true   # if true, generate training evolution videos
  n_probe: 6   # number of probe structures shown per frame in the video
  n_quick: 500   # samples per epoch used for Rg/scaling curves in the video
  gen_sample_variance: 1   # latent variance for "Generated" Rg/scaling in video (use 1 to match gen_variance plots)
  fps: 12   # frames per second of the output MP4
  frame_width: 16   # figure width in inches for each frame
  frame_height: 14   # figure height in inches for each frame
  frame_dpi: 90   # DPI for frame PNGs (before encoding to video)
  delete_frames_after_video: true   # if true, remove frame PNGs after successful MP4 creation (saves disk)

# Plotting and generation (per trained model). Disable all with --no-plots.
plotting:
  enabled: true   # if false, skip all plotting (reconstruction, gen_variance, etc.)
  overwrite_existing: false   # if true, prompt then remove existing plots/dashboard before re-running (avoids mixing runs)
  reconstruction: true   # if true, plot reconstruction (input vs reconstructed distance maps / coords)
  bond_rg_scaling: true   # if true, plot bond length and Rg scaling diagnostics
  avg_gen_vs_exp: true   # if true, plot average generated vs experimental statistics
  bond_length_by_genomic_distance: false   # if true, plot 5×4 grid of pairwise distance distributions by lag k
  num_samples: 10   # number of structures to generate per variance for gen_variance and related plots
  gen_decode_batch_size: 256   # batch size when decoding latents to structures for gen plots
  sample_variance: [1]   # list of latent variances; one plot set per value
  num_reconstruction_samples: 5   # number of structures to decode for reconstruction plots
  plot_dpi: 150   # DPI for saved PNGs (plotting + RMSD/Q/clustering analysis figures); matches src/plot_config.PLOT_DPI default
  max_train: null   # cap on train structures for reference stats; null = use all
  max_test: null   # cap on test structures for reference stats; null = use all
  save_data: true   # if true, save NumPy .npz data for each plot (e.g. reconstruction_data.npz)
  save_pdf_copy: false   # if true, save a PDF copy of each figure where supported
  save_structures_gro: true   # if true, save generated structures as GRO for gen_variance (Euclideanizer only)

# Analysis: metrics run after plotting for each Euclideanizer. Reference sizes (below) cap train/test for caching; null = use all. Large values can be slow (O(n²) pairwise comparisons).
analysis:
  rmsd_max_train: null   # cap on train structures for RMSD test→train cache; null = use all
  rmsd_max_test: null   # cap on test structures for RMSD test→train cache; null = use all
  q_max_train: 500   # cap on train structures for Q test→train cache; null = use all
  q_max_test: 500   # cap on test structures for Q test→train cache; null = use all
  coord_clustering_max_train: null   # cap on train structures for coord-clustering feats cache; null = use all
  coord_clustering_max_test: null   # cap on test structures for coord-clustering feats cache; null = use all
  distmap_clustering_max_train: null   # cap on train structures for distmap-clustering feats cache; null = use all
  distmap_clustering_max_test: null   # cap on test structures for distmap-clustering feats cache; null = use all
  latent_max_train: null   # cap on train structures for latent block (analysis/latent/); null = use all
  latent_max_test: null   # cap on test structures for latent block; null = use all
  rmsd_gen:
    enabled: true   # if true, run min-RMSD-to-training analysis on generated structures
    overwrite_existing: false   # if true, prompt then remove existing rmsd gen outputs before re-running
    num_samples: [1000]   # list of sample counts per run name (e.g. [1, 10] → run "1", "10")
    sample_variance: [1, 2]   # list of latent variances; one set of outputs per value
    query_batch_size: 256   # batch size for RMSD query (CPU RAM; set based on system memory)
    gen_decode_batch_size: 256   # batch size when decoding latents to structures
    save_data: true   # if true, save rmsd_data.npz (and similar) in analysis output dir
    save_pdf_copy: false   # if true, save PDF copies of RMSD (gen) figures in a pdf/ subdir
    save_structures_gro: true   # if true, save generated structures as GRO for this analysis
  rmsd_recon:
    enabled: true   # if true, run min-RMSD analysis on reconstructed structures
    overwrite_existing: false   # if true, prompt then remove existing rmsd recon outputs before re-running
    max_recon_train: [null]   # list of caps on train structures for recon; null = use all (one run per list entry)
    max_recon_test: [null]   # list of caps on test structures for recon; null = use all
    save_data: true   # if true, save recon RMSD data as .npz
    save_pdf_copy: false   # if true, save PDF copies of recon figures
  q_gen:
    enabled: true   # if true, run Q (order parameter) analysis on generated structures
    overwrite_existing: false   # if true, prompt then remove existing q gen outputs before re-running
    num_samples: [500]   # list of sample counts per run name
    sample_variance: [1]   # list of latent variances
    delta: 0.7071   # Q smoothing parameter (1/sqrt(2) → denominator 2*delta^2 = 1)
    query_batch_size: 64   # batch size for Q computation (CPU RAM; set based on system memory)
    gen_decode_batch_size: 256   # batch size when decoding latents to structures
    save_data: true   # if true, save Q data as .npz
    save_pdf_copy: false   # if true, save PDF copies of Q figures
    save_structures_gro: false   # if true, save generated structures as GRO
  q_recon:
    enabled: true   # if true, run Q analysis on reconstructed structures
    overwrite_existing: false   # if true, prompt then remove existing q recon outputs before re-running
    max_recon_train: [500]   # list of caps on train structures for recon
    max_recon_test: [200]   # list of caps on test structures for recon
    delta: 0.7071   # Q smoothing parameter for recon
    save_data: true   # if true, save recon Q data as .npz
    save_pdf_copy: false   # if true, save PDF copies
  coord_clustering_gen:
    enabled: true   # if true, run coordinate-based clustering analysis on generated structures (dendrograms, mixing)
    overwrite_existing: false   # if true, prompt then remove existing coord_clustering gen outputs before re-running
    num_samples: [150]   # list of sample counts per run name
    sample_variance: [1.0, 2.0]   # list of latent variances
    n_subsample: 150   # number of structures to subsample (FPS) for clustering; reduces cost
    k_mixing: 10   # number of nearest neighbours used to compute source mixing score (0–1, higher = more mixing)
    linkage_method: "average"   # scipy linkage method for hierarchical clustering (e.g. average, single, complete)
    gen_decode_batch_size: 256   # batch size when decoding latents to structures
    save_data: true   # if true, save clustering data as .npz
    save_pdf_copy: false   # if true, save PDF copies of clustering figures
  coord_clustering_recon:
    enabled: true   # if true, run coordinate-based clustering on reconstructed structures
    overwrite_existing: false   # if true, prompt then remove existing coord_clustering recon outputs before re-running
    max_recon_train: [null]   # list of caps on train structures for recon; null = use all
    max_recon_test: [null]   # list of caps on test structures for recon; null = use all
    n_subsample: 150   # number of structures to subsample (FPS) for clustering
    k_mixing: 10   # nearest neighbours for mixing score
    linkage_method: "average"   # scipy linkage method
    save_data: true   # if true, save clustering data as .npz
    save_pdf_copy: false   # if true, save PDF copies
  distmap_clustering_gen:
    enabled: true   # if true, run distance-map-based clustering analysis on generated structures (RMSE dendrograms, mixing)
    overwrite_existing: false   # if true, prompt then remove existing distmap_clustering gen outputs before re-running
    num_samples: [150]   # list of sample counts per run name
    sample_variance: [1.0, 2.0]   # list of latent variances
    n_subsample: 150   # number of structures to subsample (FPS) for clustering
    k_mixing: 10   # nearest neighbours for mixing score
    linkage_method: "average"   # scipy linkage method
    gen_decode_batch_size: 256   # batch size when decoding latents to structures
    feats_batch_size: 64   # batch size for computing distance-map features (cache and analysis)
    save_data: true   # if true, save clustering data as .npz
    save_pdf_copy: false   # if true, save PDF copies
  distmap_clustering_recon:
    enabled: true   # if true, run distance-map-based clustering on reconstructed structures
    overwrite_existing: false   # if true, prompt then remove existing distmap_clustering recon outputs before re-running
    max_recon_train: [null]   # list of caps on train structures for recon; null = use all
    max_recon_test: [null]   # list of caps on test structures for recon; null = use all
    n_subsample: 150   # number of structures to subsample (FPS) for clustering
    k_mixing: 10   # nearest neighbours for mixing score
    linkage_method: "average"   # scipy linkage method
    feats_batch_size: 64   # batch size for computing distance-map features
    save_data: true   # if true, save clustering data as .npz
    save_pdf_copy: false   # if true, save PDF copies (no per-metric latent; use analysis.latent for analysis/latent/)
  generative_capacity_rmsd:
    # Note: n_max = max(n_structures). Pairwise work scales as O(n_max^2), so large n_max can be expensive.
    enabled: false
    overwrite_existing: false
    n_structures: [100, 250, 500, 1000]
    gen_decode_batch_size: 256
    query_batch_size: 128
    save_data: true
    save_pdf_copy: false
  generative_capacity_q:
    # Note: n_max = max(n_structures). Pairwise work scales as O(n_max^2), so large n_max can be expensive.
    enabled: false
    overwrite_existing: false
    n_structures: [100, 250, 500, 1000]
    gen_decode_batch_size: 256
    query_batch_size: 128
    delta: 0.7071
    save_data: true
    save_pdf_copy: false
  latent:
    enabled: true   # if true, run latent analysis once per Euclideanizer run (analysis/latent/; uses latent_max_train / latent_max_test above)
    overwrite_existing: false   # if true, prompt then remove existing latent outputs before re-running
    save_data: true   # if true, save latent_stats.npz (mean_train, mean_test, std_train, std_test per dimension)
    save_pdf_copy: false   # if true, save PDF copies of latent figures

# Scoring: per-run evaluation (30 components, geometric mean). Reads NPZ from plotting/analysis; when enabled, NPZ are saved for scoring then deleted per block save_data after scoring.
scoring:
  enabled: true   # set true to compute per-run scores after analysis
  overwrite_existing: false   # if true, re-run score even when scores.json exists
  save_pdf_copy: false   # if true, save a PDF copy of the scores spider plot (dashboard) when built

meta_analysis:
  sufficiency:
    enabled: false   # if true, build per-seed sufficiency distributions/heatmaps from analysis/rmsd + analysis/q NPZ
    overwrite_existing: false   # if true, prompt then remove existing meta_analysis/sufficiency outputs before re-running
    save_pdf_copy: false   # if true, save PDF copies of sufficiency figures

# Dashboard: interactive HTML report in run root (dashboard/). Built once at end of pipeline when enabled.
dashboard:
  enabled: true   # if true, build dashboard from plots and analysis outputs; disable with --no-dashboard or false
