# Sample config for Euclideanizer pipeline.
# Every key can be a single value or a list; lists create a grid (train/plot once per combination).
# CLI flags override these. Dataset path is required for training: set --data or data.path here.
# The project does not bundle large data; use tests/test_data/spheres.gro (generate with tests/test_data/generate_spheres.py) or your own .gro path.

resume: false   # if true, skip runs that already have checkpoints; if false, overwrite existing outputs

data:
  path: "tests/test_data/spheres.gro"   # bundled demo data (run tests/test_data/generate_spheres.py first); or set your own path / use --data
  split_seed: [0, 42]   # single int = one run; list = one full pipeline run per seed (output under base_output_dir/seed_<n>); same seed used for train/test and for that run's DistMap + Euclideanizers
  training_split: 0.8   # fraction for training; same for both models, plotting, and analysis

output_dir: "./output"

# DistMap (distance-map VAE). Any key can be single or list; full product is run.
distmap:
  latent_dim: [256]
  beta_kl: [0.01]
  epochs: [1, 2]
  batch_size: [128]
  learning_rate: [1.0e-4]
  lambda_mse: [1.0]
  lambda_w_recon: [3.0]
  lambda_w_gen: [3.0]
  memory_efficient: false   # if true, save best model to disk on each new best (no extra copy in memory)
  save_final_models_per_stretch: true   # if true, keep model_last.pt for each epoch segment (e.g. 100, 300); if false, delete previous segment's last after resume

# Euclideanizer. One run per (DistMap run × euclideanizer hyperparameter combination).
# Latent dim is taken from the frozen DistMap; no latent_dim field here. Key order aligned with distmap where shared.
euclideanizer:
  epochs: [1]
  batch_size: [256]
  learning_rate: [1.0e-4]
  lambda_mse: [1.0]
  lambda_w_recon: [3.0]
  lambda_w_gen: [3.0]
  lambda_w_diag_recon: [2.0]
  lambda_w_diag_gen: [2.0]
  num_diags: [50]   # number of diagonals (genomic separations) used for diagonal Wasserstein loss (1..num_diags)
  memory_efficient: false   # if true, save best model to disk on each new best (no extra copy in memory)
  save_final_models_per_stretch: true   # if true, keep euclideanizer_last.pt for each epoch segment; if false, delete previous segment's last after resume

# Training videos: one MP4 per DistMap and per Euclideanizer (generated during/after each training run). Requires ffmpeg.
training_visualization:
  enabled: true
  n_probe: 6                     # number of probe structures shown per frame
  n_quick: 500                   # samples per epoch for Rg/scaling curves
  gen_sample_variance: 1         # latent variance for video "Generated" Rg/scaling (use 1 to match gen_variance plots)
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true   # if true, remove frame PNGs after successful MP4 creation
  
# Plotting and generation (per trained model). Disable all with --no-plots.
plotting:
  enabled: true
  overwrite_existing: false   # if true, prompt then remove existing plots/dashboard before re-running (avoids mixing runs)
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  bond_length_by_genomic_distance: false
  num_samples: 10              # samples per variance for gen plots
  gen_decode_batch_size: 128   # batch size when decoding for gen plots
  sample_variance: [1]         # list -> one plot set per value
  num_reconstruction_samples: 5
  plot_dpi: 150
  max_train: null   # null = use all train structures for reference stats; or int to cap
  max_test: null    # null = use all test structures for reference stats; or int to cap
  save_data: true    # if true, save NumPy .npz data for each plot (e.g. reconstruction_data.npz, loss_curves_data.npz)
  save_pdf_copy: true
  save_structures_gro: true    # if true, save generated structures for gen_variance plots (Euclideanizer only; plots/.../structures/)

# Analysis: full-pipeline metrics run after plotting for each Euclideanizer.
# Each block: enabled, overwrite_existing, then params, then save_data, save_pdf_copy, save_structures_gro (or visualize_latent).
# Reference set sizes (shared by gen and recon): null = use all; int = cap train/test reference structures.
analysis:
  rmsd_max_train: null   # reference cap for rmsd (single value)
  rmsd_max_test: null
  q_max_train: null
  q_max_test: null
  clustering_max_train: null
  clustering_max_test: null
  rmsd_gen:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd gen outputs before re-running
    num_samples: [1]
    sample_variance: [1, 2]
    query_batch_size: 128
    save_data: true
    save_pdf_copy: false   # if true, save a PDF copy of RMSD (gen) figures in a pdf/ subdir
    save_structures_gro: true
  rmsd_recon:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd recon outputs before re-running
    max_recon_train: [null]
    max_recon_test: [null]
    save_data: false
    save_pdf_copy: false   # if true, save PDF copies of recon and latent figures
    visualize_latent: false
  q_gen:
    enabled: false
    overwrite_existing: false
    num_samples: [500]
    sample_variance: [1]
    delta: 0.7071   # 1/sqrt(2); default makes denominator 2*delta^2 = 1
    query_batch_size: 64
    save_data: true
    save_pdf_copy: true
    save_structures_gro: false
  q_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [200]
    delta: 0.7071
    save_data: true
    save_pdf_copy: true
    visualize_latent: false
  clustering_gen:
    enabled: false
    overwrite_existing: false
    num_samples: [150]
    sample_variance: [1.0, 2.0]
    n_subsample: 150
    query_batch_size: 64
    save_data: false
    save_pdf_copy: false
  clustering_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: [null]
    max_recon_test: [null]
    n_subsample: 150
    save_data: false
    save_pdf_copy: false
    visualize_latent: false

# Dashboard: interactive HTML report in run root (dashboard/). Disable with --no-dashboard or dashboard.enabled: false.
dashboard:
  enabled: true
