resume: true   # if true, skip runs that already have checkpoints; if false, overwrite existing outputs
# Calibration: fixed GB reserved; max binary-search halving steps after OOM.
calibration_safety_margin_gb: 15.0
calibration_binary_search_steps: 5
calibration_training_batch_cap: 512

data:
  path: "/scratch/amk19/Euclideanizer/Data/Interpolated_Data/DataProcess/chromosome21.npz"   # bundled demo data (run tests/test_data/generate_spheres.py first); or set your own path / use --data
  split_seed: [0]   # single int = one run; list = one full pipeline run per seed (output under base_output_dir/seed_<n>); same seed used for train/test and for that run's DistMap + Euclideanizers
  training_split: [0.8]   # fraction for training; same for both models, plotting, and analysis
  exp_stats_chunk_size: 100   # batch size when computing distance maps for experimental statistics (memory vs speed)
  exp_stats_avg_map_sample: 3000   # number of structures to average for avg_exp_map in experimental statistics
  max_data: null

output_dir: "/scratch/amk19/Euclideanizer/Outputs/3-21/RANGE/Chrom_21/MSE_Kabsch_Sweep"

distmap:
  latent_dim: 512
  beta_kl: 0.14746416092914974
  epochs: 500
  batch_size: 128
  learning_rate: 0.0002
  lambda_mse: 2.3064739628545214
  lambda_w_recon: 0.02722983869831472
  lambda_w_gen: 0.09342179969411857
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: true
  patience: 50

euclideanizer:
  epochs: 500
  batch_size: 128
  learning_rate: 0.0004
  lambda_mse: 0.08213385643078988
  lambda_w_recon: 0.4114869929736251
  lambda_w_gen: 0.04289942842260451
  lambda_w_diag_recon: 0.2578154525014001
  lambda_w_diag_gen: 0.016316750110319248
  num_diags: 498
  lambda_kabsch_mse: [0.01136410492655878, 0.025, 0.05, 0.1, 0.25, 0.5, 0.75, 1]
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: true
  patience: 50
  
# Training videos: one MP4 per DistMap and per Euclideanizer (generated during/after each training run). Requires ffmpeg.
training_visualization:
  enabled: true
  n_probe: 6                     # number of probe structures shown per frame
  n_quick: 500                   # samples per epoch for Rg/scaling curves
  gen_sample_variance: 1         # latent variance for video "Generated" Rg/scaling (use 1 to match gen_variance plots)
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true   # if true, remove frame PNGs after successful MP4 creation
  
# Plotting and generation (per trained model). Disable all with --no-plots.
plotting:
  enabled: true
  overwrite_existing: false   # if true, prompt then remove existing plots/dashboard before re-running (avoids mixing runs)
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  bond_length_by_genomic_distance: true
  num_samples: 1000              # samples per variance for gen plots
  gen_decode_batch_size: 256   # batch size when decoding for gen plots
  sample_variance: [1]         # list -> one plot set per value
  num_reconstruction_samples: 5
  plot_dpi: 150
  max_train: null   # null = use all train structures for reference stats; or int to cap
  max_test: null    # null = use all test structures for reference stats; or int to cap
  save_data: true    # if true, save NumPy .npz data for each plot (e.g. reconstruction_data.npz, loss_curves_data.npz)
  save_pdf_copy: true
  save_structures_gro: false    # if true, save generated structures for gen_variance plots (Euclideanizer only; plots/.../structures/)

# Analysis: full-pipeline metrics run after plotting for each Euclideanizer.
# Each block: enabled, overwrite_existing, then params, then save_data, save_pdf_copy, save_structures_gro (or visualize_latent).
# Reference set sizes (shared by gen and recon): null = use all; int = cap train/test reference structures.
analysis:
  rmsd_max_train: 1000   # reference cap for rmsd (single value)
  rmsd_max_test: 1000
  q_max_train: 500
  q_max_test: 500
  coord_clustering_max_train: 1000
  coord_clustering_max_test: 1000
  distmap_clustering_max_train: 1000
  distmap_clustering_max_test: 1000
  latent_max_train: 1000
  latent_max_test: 1000
  rmsd_gen:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd gen outputs before re-running
    num_samples: [1000]
    sample_variance: [1]
    query_batch_size: 256
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: true   # if true, save a PDF copy of RMSD (gen) figures in a pdf/ subdir
    save_structures_gro: false
  rmsd_recon:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd recon outputs before re-running
    max_recon_train: [1000]
    max_recon_test: [1000]
    save_data: true
    save_pdf_copy: true   # if true, save PDF copies of recon and latent figures
  q_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [500]
    sample_variance: [1]
    delta: 0.7071   # 1/sqrt(2); default makes denominator 2*delta^2 = 1
    query_batch_size: 64
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: true
    save_structures_gro: false
  q_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [500]
    delta: 0.7071
    save_data: true
    save_pdf_copy: true
  coord_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [1000]
    sample_variance: [1.0]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    save_data: true
    save_pdf_copy: true
  coord_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [1000]
    max_recon_test: [1000]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    save_data: true
    save_pdf_copy: true
  distmap_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [1000]
    sample_variance: [1.0]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    feats_batch_size: 64
    save_data: true
    save_pdf_copy: true
  distmap_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [1000]
    max_recon_test: [1000]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    feats_batch_size: 64
    save_data: true
    save_pdf_copy: true
  generative_capacity_rmsd:
    enabled: true
    overwrite_existing: false
    n_structures: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000]
    gen_decode_batch_size: 256
    query_batch_size: 128
    # save_data true: n*_min_rmsd.npz + pairwise_matrix.npz (full RMSD matrix)
    save_data: true
    save_pdf_copy: true
  generative_capacity_q:
    enabled: true
    overwrite_existing: false
    n_structures: [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000]
    gen_decode_batch_size: 256
    query_batch_size: 128
    delta: 0.7071
    # save_data true: n*_max_q.npz + pairwise_matrix.npz (full Q matrix + delta)
    save_data: true
    save_pdf_copy: true
  latent:
    enabled: true
    overwrite_existing: false
    save_data: true
    save_pdf_copy: true

# Scoring: per-run evaluation (30 components, geometric mean). Reads NPZ from plotting/analysis; when enabled, NPZ are saved for scoring.
scoring:
  enabled: true
  overwrite_existing: false
  save_pdf_copy: true

meta_analysis:
  sufficiency:
    enabled: true
    overwrite_existing: false
    save_pdf_copy: true

# Dashboard: interactive HTML report in run root (dashboard/). Disable with --no-dashboard or dashboard.enabled: false.
dashboard:
  enabled: true
