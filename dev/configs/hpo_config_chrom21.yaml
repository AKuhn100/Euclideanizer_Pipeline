output_dir: "/scratch/amk19/Euclideanizer/HPO_Outputs_Chrom21_Slurm/3-24"

data_path: /scratch/amk19/Euclideanizer/Data/Interpolated_Data/DataProcess/chromosome21.npz
seed: 15

epoch_cap: 500

pipeline_config: "/scratch/amk19/Euclideanizer/Pipeline/dev/configs/config_hpo.yaml"

search_space:
  distmap:
    latent_dim: {type: categorical, choices: [64, 128, 256, 512]}
    beta_kl: {type: log_float, low: 1.0e-2, high: 5.0e-1}
    lambda_mse: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_recon: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_gen: {type: log_float, low: 1.0e-2, high: 1.0e1}
  euclideanizer:
    lambda_mse: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_recon: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_gen: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_diag_recon: {type: log_float, low: 1.0e-2, high: 1.0e1}
    lambda_w_diag_gen: {type: log_float, low: 1.0e-2, high: 1.0e1}
    num_diags: {type: int, low: 10, high: 650}
    lambda_kabsch_mse: {type: log_float, low: 1.0e-2, high: 1.0e1}

optuna:
  n_trials: 1000
  show_progress_bar: false
  sampler: "TPESampler"
  sampler_kwargs: {n_startup_trials: 30, multivariate: true}
  pruner: "null"
  pruner_kwargs: {min_resource: 100, max_resource: 500, reduction_factor: 3}
  pruner_patient: true
  pruner_patience: 3

n_gpus: null
