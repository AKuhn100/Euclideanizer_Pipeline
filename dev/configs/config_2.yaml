resume: true   # if true, skip runs that already have checkpoints; if false, overwrite existing outputs
# Calibration: fixed GB reserved; max binary-search halving steps after OOM.
calibration_safety_margin_gb: 15.0
calibration_binary_search_steps: 5
calibration_training_batch_cap: 512

data:
  path: "/scratch/amk19/Euclideanizer/Data/Interpolated_Data/DataProcess/chromosome2.npz"   # bundled demo data (run tests/test_data/generate_spheres.py first); or set your own path / use --data
  split_seed: [15]   # single int = one run; list = one full pipeline run per seed (output under base_output_dir/seed_<n>); same seed used for train/test and for that run's DistMap + Euclideanizers
  training_split: [0.8]   # fraction for training; same for both models, plotting, and analysis
  exp_stats_chunk_size: 100   # batch size when computing distance maps for experimental statistics (memory vs speed)
  exp_stats_avg_map_sample: 1000   # number of structures to average for avg_exp_map in experimental statistics
  max_data: null

output_dir: "/scratch/amk19/Euclideanizer/Outputs/3-16/RANGE_SLURM/High_Coord_Loss/Chrom_2"

# DistMap (distance-map VAE). Any key can be single or list; full product is run.
distmap:
  latent_dim: [512]
  beta_kl: [0.05]
  epochs: [500]
  batch_size: 128
  learning_rate: [2.0e-4]
  lambda_mse: [3.0]
  lambda_w_recon: [3.0]
  lambda_w_gen: [3.0]
  memory_efficient: true   # if true, save best model to disk on each new best (no extra copy in memory)
  save_final_models_per_stretch: false   # if true, keep model_last.pt for each epoch segment (e.g. 100, 300); if false, delete previous segment's last after resume
  early_stopping: true   # if true, stop when validation loss has not improved for patience epochs (no further segments run)
  patience: 50 

# Euclideanizer. One run per (DistMap run × euclideanizer hyperparameter combination).
# Latent dim is taken from the frozen DistMap; no latent_dim field here. Key order aligned with distmap where shared.
euclideanizer:
  epochs: [500]
  batch_size: 128
  learning_rate: [4.0e-4]
  lambda_mse: [10.0]
  lambda_w_recon: [3.0]
  lambda_w_gen: [3.0]
  lambda_w_diag_recon: [2.0]
  lambda_w_diag_gen: [2.0]
  num_diags: [50]   # number of diagonals (genomic separations) used for diagonal Wasserstein loss (1..num_diags)
  lambda_kabsch_mse: [10.0]   # weight for MSE(gt_coords, Kabsch_aligned(recon_coords)); 0 = off
  memory_efficient: true   # if true, save best model to disk on each new best (no extra copy in memory)
  save_final_models_per_stretch: false   # if true, keep euclideanizer_last.pt for each epoch segment; if false, delete previous segment's last after resume
  early_stopping: true   # if true, stop when validation loss has not improved for patience epochs (no further segments run)
  patience: 50 
  
# Training videos: one MP4 per DistMap and per Euclideanizer (generated during/after each training run). Requires ffmpeg.
training_visualization:
  enabled: true
  n_probe: 6                     # number of probe structures shown per frame
  n_quick: 500                   # samples per epoch for Rg/scaling curves
  gen_sample_variance: 1         # latent variance for video "Generated" Rg/scaling (use 1 to match gen_variance plots)
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true   # if true, remove frame PNGs after successful MP4 creation
  
# Plotting and generation (per trained model). Disable all with --no-plots.
plotting:
  enabled: true
  overwrite_existing: false   # if true, prompt then remove existing plots/dashboard before re-running (avoids mixing runs)
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  bond_length_by_genomic_distance: true
  num_samples: 1000              # samples per variance for gen plots
  gen_decode_batch_size: 256   # batch size when decoding for gen plots
  sample_variance: [1]         # list -> one plot set per value
  num_reconstruction_samples: 5
  plot_dpi: 150
  max_train: null   # null = use all train structures for reference stats; or int to cap
  max_test: null    # null = use all test structures for reference stats; or int to cap
  save_data: false    # if true, save NumPy .npz data for each plot (e.g. reconstruction_data.npz, loss_curves_data.npz)
  save_pdf_copy: true
  save_structures_gro: false    # if true, save generated structures for gen_variance plots (Euclideanizer only; plots/.../structures/)

# Analysis: full-pipeline metrics run after plotting for each Euclideanizer.
# Each block: enabled, overwrite_existing, then params, then save_data, save_pdf_copy, save_structures_gro (or visualize_latent).
# Reference set sizes (shared by gen and recon): null = use all; int = cap train/test reference structures.
analysis:
  rmsd_max_train: 1000   # reference cap for rmsd (single value)
  rmsd_max_test: 1000
  q_max_train: 500
  q_max_test: 500
  coord_clustering_max_train: null
  coord_clustering_max_test: null
  distmap_clustering_max_train: null
  distmap_clustering_max_test: null
  latent_max_train: null
  latent_max_test: null
  rmsd_gen:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd gen outputs before re-running
    num_samples: [1000]
    sample_variance: [1]
    query_batch_size: 256
    gen_decode_batch_size: 256
    save_data: false
    save_pdf_copy: true   # if true, save a PDF copy of RMSD (gen) figures in a pdf/ subdir
    save_structures_gro: false
  rmsd_recon:
    enabled: true
    overwrite_existing: false   # if true, prompt then remove existing rmsd recon outputs before re-running
    max_recon_train: [1000]
    max_recon_test: [1000]
    save_data: false
    save_pdf_copy: true   # if true, save PDF copies of recon and latent figures
    visualize_latent: true
  q_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [500]
    sample_variance: [1]
    delta: 0.7071   # 1/sqrt(2); default makes denominator 2*delta^2 = 1
    query_batch_size: 64
    gen_decode_batch_size: 256
    save_data: false
    save_pdf_copy: true
    save_structures_gro: false
  q_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [500]
    delta: 0.7071
    save_data: false
    save_pdf_copy: false
  coord_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [5000]
    sample_variance: [1.0]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    save_data: false
    save_pdf_copy: false
  coord_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [null]
    max_recon_test: [null]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    save_data: false
    save_pdf_copy: false
  distmap_clustering_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [5000]
    sample_variance: [1.0]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 256
    feats_batch_size: 64
    save_data: false
    save_pdf_copy: false
  distmap_clustering_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: [null]
    max_recon_test: [null]
    n_subsample: 150
    k_mixing: 10
    linkage_method: "average"
    feats_batch_size: 64
    save_data: false
    save_pdf_copy: false
  generative_capacity_rmsd:
    enabled: false
    overwrite_existing: false
    n_structures: [100, 250, 500]
    gen_decode_batch_size: 256
    query_batch_size: 128
    # save_data true: per-n NPZ + pairwise_matrix.npz (full matrix)
    save_data: false
    save_pdf_copy: false
  generative_capacity_q:
    enabled: false
    overwrite_existing: false
    n_structures: [100, 250, 500]
    gen_decode_batch_size: 256
    query_batch_size: 128
    delta: 0.7071
    save_data: false
    save_pdf_copy: false
  latent:
    enabled: true
    overwrite_existing: false
    save_data: false
    save_pdf_copy: false

# Scoring: per-run evaluation (30 components, geometric mean). Reads NPZ from plotting/analysis; when enabled, NPZ are saved for scoring.
scoring:
  enabled: true
  overwrite_existing: false
  save_pdf_copy: false

meta_analysis:
  sufficiency:
    enabled: false
    overwrite_existing: false
    save_pdf_copy: false

# Dashboard: interactive HTML report in run root (dashboard/). Disable with --no-dashboard or dashboard.enabled: false.
dashboard:
  enabled: true
