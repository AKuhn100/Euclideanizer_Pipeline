# Minimal config for pipeline behavior tests (no dataset required).
# 1 seed, 2 DistMap runs (epochs 1 and 2), 2 Euclideanizer runs (epochs 1 and 2).

resume: true

data:
  path: null
  split_seed: 0
  training_split: 0.8
  exp_stats_chunk_size: 100
  exp_stats_avg_map_sample: 100

output_dir: "./test_output"

distmap:
  latent_dim: 4
  beta_kl: 0.01
  epochs: [1, 2]
  batch_size: 8
  learning_rate: 1.0e-4
  lambda_mse: 1.0
  lambda_w_recon: 1.0
  lambda_w_gen: 1.0
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: false
  patience: 20

euclideanizer:
  epochs: [1, 2]
  batch_size: 8
  learning_rate: 1.0e-4
  lambda_mse: 1.0
  lambda_w_recon: 1.0
  lambda_w_gen: 1.0
  lambda_w_diag_recon: 1.0
  lambda_w_diag_gen: 1.0
  num_diags: 50
  lambda_kabsch_mse: 0
  memory_efficient: false
  save_final_models_per_stretch: false
  early_stopping: false
  patience: 20

plotting:
  enabled: true
  overwrite_existing: false
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  bond_length_by_genomic_distance: false
  num_samples: 10
  gen_decode_batch_size: 8
  sample_variance: [1.0]
  num_reconstruction_samples: 2
  max_train: null
  max_test: null
  save_data: false
  save_pdf_copy: false
  save_structures_gro: false

training_visualization:
  enabled: false
  n_probe: 6
  n_quick: 500
  gen_sample_variance: 1.0
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true

analysis:
  rmsd_max_train: null
  rmsd_max_test: null
  q_max_train: null
  q_max_test: null
  coord_clustering_max_train: null
  coord_clustering_max_test: null
  distmap_clustering_max_train: null
  distmap_clustering_max_test: null
  latent_max_train: null
  latent_max_test: null
  latent:
    enabled: false
    overwrite_existing: false
    save_data: false
    save_pdf_copy: false
  rmsd_gen:
    enabled: true
    overwrite_existing: false
    num_samples: 10
    sample_variance: [1.0]
    query_batch_size: 8
    gen_decode_batch_size: 8
    save_data: false
    save_pdf_copy: false
    save_structures_gro: false
  rmsd_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: null
    max_recon_test: null
    save_data: false
    save_pdf_copy: false
  q_gen:
    enabled: false
    overwrite_existing: false
    num_samples: [500]
    sample_variance: [1]
    delta: 0.7071
    query_batch_size: 64
    gen_decode_batch_size: 8
    save_data: false
    save_pdf_copy: false
    save_structures_gro: false
  q_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [200]
    delta: 0.7071
    save_data: false
    save_pdf_copy: false
  coord_clustering_gen:
    enabled: false
    overwrite_existing: false
    num_samples: [10]
    sample_variance: [1.0]
    n_subsample: 50
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 8
    save_data: false
    save_pdf_copy: false
  coord_clustering_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: null
    max_recon_test: null
    n_subsample: 50
    k_mixing: 10
    linkage_method: "average"
    save_data: false
    save_pdf_copy: false
  distmap_clustering_gen:
    enabled: false
    overwrite_existing: false
    num_samples: [10]
    sample_variance: [1.0]
    n_subsample: 50
    k_mixing: 10
    linkage_method: "average"
    gen_decode_batch_size: 8
    feats_batch_size: 8
    save_data: false
    save_pdf_copy: false
  distmap_clustering_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: null
    max_recon_test: null
    n_subsample: 50
    k_mixing: 10
    linkage_method: "average"
    feats_batch_size: 8
    save_data: false
    save_pdf_copy: false

scoring:
  enabled: false
  overwrite_existing: false
  save_pdf_copy: false

dashboard:
  enabled: true
