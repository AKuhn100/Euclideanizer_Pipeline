# Minimal config for smoke test: two seeds (enables multi-GPU parallel execution when 2+ GPUs are available),
# one DistMap epoch, one Euclideanizer epoch. The smoke test sets data.path and output_dir at runtime.

resume: false

data:
  path: null
  split_seed: [0, 1]
  training_split: 0.8

output_dir: "./smoke_out"

distmap:
  latent_dim: 4
  beta_kl: 0.01
  epochs: [1]
  batch_size: 8
  learning_rate: 1.0e-4
  lambda_mse: 1.0
  lambda_w_recon: 1.0
  lambda_w_gen: 1.0
  memory_efficient: false
  save_final_models_per_stretch: false

euclideanizer:
  epochs: [1]
  batch_size: 8
  learning_rate: 1.0e-4
  lambda_mse: 1.0
  lambda_w_recon: 1.0
  lambda_w_gen: 1.0
  lambda_w_diag_recon: 1.0
  lambda_w_diag_gen: 1.0
  num_diags: 50
  memory_efficient: false
  save_final_models_per_stretch: false

plotting:
  enabled: true
  overwrite_existing: false
  reconstruction: true
  bond_rg_scaling: true
  avg_gen_vs_exp: true
  num_samples: 2
  gen_decode_batch_size: 8
  sample_variance: [1.0]
  num_reconstruction_samples: 2
  plot_dpi: 72
  save_data: false
  save_pdf_copy: false
  save_structures_gro: false

training_visualization:
  enabled: false
  n_probe: 6
  n_quick: 500
  fps: 12
  frame_width: 16
  frame_height: 14
  frame_dpi: 90
  delete_frames_after_video: true

analysis:
  rmsd_gen:
    enabled: true
    overwrite_existing: false
    num_samples: [1]
    sample_variance: [1.0]
    query_batch_size: 8
    save_data: false
    save_pdf_copy: false
    save_structures_gro: false
  rmsd_recon:
    enabled: true
    overwrite_existing: false
    max_recon_train: null
    max_recon_test: null
    save_data: false
    save_pdf_copy: false
    visualize_latent: false
  q_gen:
    enabled: false
    overwrite_existing: false
    max_train: 500
    max_test: 200
    num_samples: [500]
    sample_variance: [1]
    delta: 0.7071
    query_batch_size: 64
    save_data: false
    save_pdf_copy: false
    save_structures_gro: false
  q_recon:
    enabled: false
    overwrite_existing: false
    max_recon_train: [500]
    max_recon_test: [200]
    delta: 0.7071
    save_data: false
    save_pdf_copy: false
    visualize_latent: false

dashboard:
  enabled: true
